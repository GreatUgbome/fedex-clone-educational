name: Deploy to Firebase

on:
  push:
    branches:
      - main # Change this if your default branch is 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches the nodejs20 runtime in firebase.json
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      # Optional: Run backend tests if you have them configured
      - name: Run Tests
        working-directory: ./backend
        run: npm test

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        # Deploys both hosting and functions
        run: firebase deploy --project courier-shipment-a85aa --token $FIREBASE_TOKEN --non-interactive